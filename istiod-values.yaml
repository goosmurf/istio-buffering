profile: ambient
pilot:
  env:
    ENABLE_INGRESS_WAYPOINT_ROUTING: true
    PILOT_ENABLE_ALPHA_GATEWAY_API: true
    #PILOT_HTTP10: true
meshConfig:
  defaultConfig:
    proxyStatsMatcher:
      inclusionRegexps:
        - ".*"
  discoverySelectors:
  - matchLabels:
      istio-discovery: enabled
  hboneIdleTimeout: 15s
