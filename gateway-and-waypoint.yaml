# Gateway
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-gateway
  labels:
    istio-discovery: enabled

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: istio-gateway
  namespace: istio-gateway
# If you want to test without a LoadBalancer
#  annotations:
#    networking.istio.io/service-type: ClusterIP 
spec:
  gatewayClassName: istio
  # infrastructure:
  #   parametersRef:
  #     group: ""
  #     kind: ConfigMap
  #     name: istio-gateway-options  
  allowedListeners:
    namespaces:
      from: All
  listeners:
  - name: tls-listener
    port: 9999
    protocol: TLS
    allowedRoutes:
      namespaces:
        from: All
    tls:
      mode: Passthrough

---

